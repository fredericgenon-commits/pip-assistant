spring:
  application:
    name: pip-assistant-backend

  # H2 file-based database for development (data survives restarts). The file lives under
  # ./data relative to the backend working directory. To be migrated to MS SQL Server
  # later; keep migrations and types portable (avoid H2-specific SQL).
  # AUTO_SERVER=TRUE allows the H2 console / a second connection while the app runs.
  datasource:
    url: jdbc:h2:file:./data/pipassistant;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    # Flyway owns the schema; Hibernate must not generate or validate DDL.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway-managed migrations from the very first version.
  flyway:
    enabled: true
    locations: classpath:db/migration

  # H2 web console disabled by default (no UI exposure).
  h2:
    console:
      enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application-specific configuration.
pip:
  requirement:
    # Allowed requirement statuses (configurable; restart to apply).
    statuses:
      - TODO
      - IN_PROGRESS
      - DONE
  import:
    # Excel layout for the PM planning file. Columns are matched by 0-based POSITION
    # (header labels in the file may differ, e.g. "REQ Title"). Matches the files
    # produced by the generate-test-excel skill.
    sheet-index: 0
    first-data-row: 1        # 0-based: row 0 is the header
    columns:
      tcm: 0
      tcm-description: 1
      req: 2
      req-description: 3
      comment: 4
      teams:                 # team name (seeded) -> column index
        Core: 5
        Portal: 6
        Process: 7
        Assets: 8
        API: 9
        Document: 10
