<main class="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6">
  <mat-card class="max-w-md w-full">
    <mat-card-header>
      <mat-card-title>{{ title() }}</mat-card-title>
      <mat-card-subtitle>Phase 1 — hello world</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="pt-4">
      <p class="text-slate-600 mb-4">
        Frontend (Angular + Tailwind + Material) talking to the Spring Boot backend.
      </p>

      <div class="flex items-center gap-3">
        <span class="font-medium">Backend status:</span>

        @switch (backendState()) {
          @case ('loading') {
            <mat-spinner [diameter]="20"></mat-spinner>
            <span class="text-slate-500">checking…</span>
          }
          @case ('up') {
            <mat-icon class="text-green-600">check_circle</mat-icon>
            <span class="text-green-700 font-semibold">{{ backendStatus() }}</span>
          }
          @case ('down') {
            <mat-icon class="text-red-600">error</mat-icon>
            <span class="text-red-700 font-semibold">{{ backendStatus() }}</span>
          }
        }
      </div>
    </mat-card-content>
  </mat-card>
</main>
