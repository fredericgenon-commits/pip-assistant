<div class="dialog">
  <div class="dialog__body">
    <h2 class="h-title dialog__title">Nouveau PIP</h2>
    <p class="dialog__subtitle">Le code suivant est suggéré automatiquement.</p>

    <label class="dialog__label" for="pip-name">Nom du PIP</label>
    <input
      id="pip-name"
      class="dialog__input"
      [class.error]="error()"
      [formControl]="code"
      (input)="onInput()"
      placeholder="yy_PIP_n"
      autocomplete="off"
    />

    @if (error(); as message) {
      <p class="dialog__error">{{ message }}</p>
    } @else {
      <p class="dialog__hint">
        Format <span class="mono">yy_PIP_n</span> · le numéro est comparé numériquement.
      </p>
    }
  </div>

  <div class="dialog__footer">
    <button type="button" class="btn btn--ghost" (click)="cancel()">Annuler</button>
    <button type="button" class="btn btn--primary" [disabled]="saving()" (click)="save()">
      Enregistrer
    </button>
  </div>
</div>
