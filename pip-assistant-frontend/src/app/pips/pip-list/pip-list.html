<h1 class="text-2xl font-semibold mb-4">PIPs</h1>

<div class="flex items-end gap-4 mb-4">
  <mat-form-field appearance="outline" class="w-40">
    <mat-label>Year</mat-label>
    <mat-select [(ngModel)]="selectedYear">
      <mat-option [value]="'ALL'">All</mat-option>
      @for (year of years(); track year) {
        <mat-option [value]="year">{{ year }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <button mat-stroked-button (click)="refresh()">
    <mat-icon>refresh</mat-icon>
    Refresh
  </button>

  <button mat-flat-button color="primary" (click)="openNew()">
    <mat-icon>add</mat-icon>
    New
  </button>
</div>

<table mat-table [dataSource]="pips()" class="w-full max-w-2xl">
  <ng-container matColumnDef="code">
    <th mat-header-cell *matHeaderCellDef>PIP name</th>
    <td mat-cell *matCellDef="let pip">{{ pip.code }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let pip">
      <span class="inline-block rounded-full px-2 py-0.5 text-xs font-medium bg-slate-200 text-slate-700">
        {{ pip.status }}
      </span>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    class="cursor-pointer hover:bg-slate-50"
    (dblclick)="open(row)"
  ></tr>
</table>

@if (pips().length === 0) {
  <p class="text-slate-500 mt-4">No PIP yet. Click “New” to create the first one.</p>
}
